<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Wanderlust</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Wander<span>lust</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="register.html" class="nav-btn">Register</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo"><a href="index.html">Wanderlust</a></div>
    <div class="auth-title">Welcome Back</div>
    <div class="auth-sub">Sign in to continue your travel journey</div>

    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="Enter your password">
    </div>
    <button class="form-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>

    <div class="auth-switch">Don't have an account? <a href="register.html">Register here</a></div>
    <div style="margin-top:20px;padding:16px;background:var(--dark3);border-radius:10px;font-size:13px;color:var(--text-muted)">
      <strong style="color:var(--gold)">Admin?</strong> <a href="admin.html" style="color:var(--gold)">Go to Admin Panel →</a>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3000/api';
function showError(msg) { const el = document.getElementById('errorAlert'); el.textContent = msg; el.style.display = 'block'; document.getElementById('successAlert').style.display = 'none'; }
function showSuccess(msg) { const el = document.getElementById('successAlert'); el.textContent = msg; el.style.display = 'block'; document.getElementById('errorAlert').style.display = 'none'; }

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return showError('Please fill in all fields');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const res = await fetch(API + '/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showSuccess('Login successful! Redirecting...');
      setTimeout(() => window.location.href = 'index.html', 1200);
    } else { showError(data.message || 'Login failed'); btn.disabled = false; btn.textContent = 'Sign In →'; }
  } catch(e) { showError('Cannot connect to server. Make sure backend is running.'); btn.disabled = false; btn.textContent = 'Sign In →'; }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
if (localStorage.getItem('token')) window.location.href = 'index.html';
</script>
</body>
</html>
